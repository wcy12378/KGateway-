version: "3.9"

# ═══════════════════════════════════════════════════════════════════
#  KGateway + OmniParse ETL — Full-stack orchestration
# ═══════════════════════════════════════════════════════════════════

services:
  # ── Infrastructure ───────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: kgw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    container_name: kgw-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 3

  neo4j:
    image: neo4j:5-community
    container_name: kgw-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-kgateway_dev}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:7474"]
      interval: 15s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: kgw-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Application Services ────────────────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: kgw-gateway
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""
      QDRANT_COLLECTION: kgateway_vectors
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-kgateway_dev}
      REDIS_URL: redis://redis:6379
      KGW_DEBUG: "false"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  etl-api:
    build:
      context: .
      dockerfile: Dockerfile.etl
    container_name: kgw-etl-api
    ports:
      - "8001:8001"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: omniparse-raw
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  etl-worker:
    build:
      context: .
      dockerfile: Dockerfile.etl
    container_name: kgw-etl-worker
    command: >
      celery -A src.worker.tasks worker
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=10
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: omniparse-raw
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
  qdrant-data:
  neo4j-data:
  minio-data:
