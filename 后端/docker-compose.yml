# ═══════════════════════════════════════════════════════════════════
#  KAgent — 企业 AI Agent 平台全栈编排
# ═══════════════════════════════════════════════════════════════════

services:
  # ── Infrastructure ───────────────────────────────────────────────

  redis:
    image: redis/redis-stack-server:7.4.0-v8
    container_name: kgw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG && redis-cli FT._LIST >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    container_name: kgw-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 3

  neo4j:
    image: neo4j:5-community
    container_name: kgw-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-kagent_dev}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:7474"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Application Services ────────────────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: kgw-gateway
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""
      QDRANT_COLLECTION: kagent_vectors
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-kagent_dev}
      REDIS_URL: redis://redis:6379
      KAGENT_DEBUG: "false"
      KAGENT_FAQ_PATH: /app/config/faq.json
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
  qdrant-data:
  neo4j-data:
