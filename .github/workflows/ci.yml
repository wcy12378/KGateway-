name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 后端

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: 后端/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio

      - name: AST syntax check
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          files = list(Path("src").rglob("*.py"))
          for path in files:
              ast.parse(path.read_text(encoding="utf-8"), filename=str(path))
          print(f"AST parsed {len(files)} Python files")
          PY

      - name: Import check
        run: python -c "import src.main; print('src.main import OK')"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 前端

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: 前端/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
